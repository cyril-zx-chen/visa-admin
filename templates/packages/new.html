{% extends "base.html" %}
{% block title %}New Package — Visa Admin{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">New Package</h1>
    <p class="page-subtitle">Create a visa document template</p>
  </div>
  <a href="{{ url_for('packages.list_packages') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('packages.create_package') }}">
          <div class="mb-4">
            <label for="name" class="form-label">Package Name</label>
            <input type="text" class="form-control" id="name" name="name"
                   placeholder="e.g. UK Visa Package" required autofocus>
            <div class="form-text mt-2">
              This name must be unique and will be used when importing students from CSV.
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-plus-lg me-1"></i> Create Package
            </button>
            <a href="{{ url_for('packages.list_packages') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
