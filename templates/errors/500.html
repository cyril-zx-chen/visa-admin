{% extends "base.html" %}
{% block title %}Error — Visa Admin{% endblock %}
{% block content %}
<div class="text-center py-5">
  <h1 class="display-4">500</h1>
  <p class="lead text-muted">Something went wrong.</p>
  {% if error %}
    <pre class="text-start d-inline-block bg-light p-3 rounded border small">{{ error }}</pre>
  {% endif %}
  <br>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary mt-3">Back to Dashboard</a>
</div>
{% endblock %}
